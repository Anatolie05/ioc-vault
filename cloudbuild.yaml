steps:
  # 1. Build backend image
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/backend:$COMMIT_SHA
      - ./backend

  # 2. Push backend image
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/backend:$COMMIT_SHA

  # 3. Deploy backend to Cloud Run (port 8080 default, no --port flag)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ioc-vault-backend
      - --image=europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/backend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=DATABASE_URL=postgresql://postgres:h%23um%2C6MW7Q-X_Y8@db.kdjqrznvswvverqzxdyx.supabase.co:5432/postgres

  # 4. Build frontend image with backend URL baked in
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://ioc-vault-backend-842981605206.europe-west1.run.app
      - -t
      - europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/frontend:$COMMIT_SHA
      - ./frontend

  # 5. Push frontend image
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/frontend:$COMMIT_SHA

  # 6. Deploy frontend to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ioc-vault-frontend
      - --image=europe-west1-docker.pkg.dev/project-5313e0ae-d788-44ac-9cd/ioc-vault/frontend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=NEXT_PUBLIC_API_URL=https://ioc-vault-backend-842981605206.europe-west1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
