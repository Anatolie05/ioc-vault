apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ioc_vault-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres-service:5432/ioc_vault
            - name: PORT
              value: "3001"
